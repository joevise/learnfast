<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LearnFast - 用AI把读过的都记住</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');

* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #0a0a0f;
  --bg2: #13131a;
  --card: #1a1a24;
  --accent: #6366f1;
  --accent2: #8b5cf6;
  --gold: #f59e0b;
  --success: #22c55e;
  --danger: #ef4444;
  --text: #fff;
  --text2: #9ca3af;
  --text3: #6b7280;
  --border: rgba(255,255,255,0.08);
}

body {
  font-family: 'Inter', -apple-system, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  line-height: 1.6;
}

.app { max-width: 680px; margin: 0 auto; padding: 0 20px 100px; }

/* Header */
.header {
  padding: 48px 0 32px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.logo { font-size: 22px; font-weight: 800; background: linear-gradient(135deg, var(--accent), var(--accent2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
.tagline { font-size: 13px; color: var(--text3); }

.streak-badge {
  display: flex;
  align-items: center;
  gap: 6px;
  background: var(--card);
  border: 1px solid var(--border);
  padding: 8px 14px;
  border-radius: 20px;
  font-size: 13px;
  font-weight: 600;
}
.streak-badge .🔥 { font-size: 16px; }

/* Input Section */
.input-section {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 28px;
  margin-bottom: 24px;
}

.input-label { font-size: 15px; font-weight: 600; margin-bottom: 12px; }

.url-input-row { display: flex; gap: 10px; margin-bottom: 12px; }

.url-input {
  flex: 1;
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 14px 16px;
  font-size: 15px;
  color: var(--text);
  outline: none;
  font-family: inherit;
  transition: border-color 0.2s;
}
.url-input:focus { border-color: var(--accent); }
.url-input::placeholder { color: var(--text3); }

.analyze-btn {
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  border: none;
  border-radius: 12px;
  padding: 14px 24px;
  font-size: 15px;
  font-weight: 600;
  color: white;
  cursor: pointer;
  transition: opacity 0.2s;
  white-space: nowrap;
}
.analyze-btn:hover { opacity: 0.9; }
.analyze-btn:disabled { opacity: 0.5; cursor: not-allowed; }

.tips { font-size: 12px; color: var(--text3); }

/* Loading */
.loading {
  display: none;
  text-align: center;
  padding: 40px 0;
}
.loading.active { display: block; }

.spinner {
  width: 36px; height: 36px;
  border: 3px solid var(--card);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 1s linear infinite;
  margin: 0 auto 16px;
}
@keyframes spin { to { transform: rotate(360deg); } }

.loading-text { color: var(--text2); font-size: 14px; }

/* Results */
.results { display: none; }
.results.active { display: block; }

.result-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 24px;
  margin-bottom: 16px;
}

.result-header { display: flex; justify-content: space-between; align-items: start; margin-bottom: 16px; }
.result-title { font-size: 17px; font-weight: 700; flex: 1; padding-right: 12px; }
.result-url { font-size: 12px; color: var(--text3); word-break: break-all; margin-top: 4px; }
.result-time { font-size: 11px; color: var(--text3); white-space: nowrap; }

/* Summary */
.summary { font-size: 14px; line-height: 1.8; color: var(--text2); margin-bottom: 16px; white-space: pre-wrap; }

/* Key Points */
.key-points { margin-bottom: 8px; }
.key-points-title { font-size: 13px; font-weight: 600; color: var(--text3); margin-bottom: 10px; text-transform: uppercase; letter-spacing: 1px; }
.point {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  padding: 10px 0;
  border-bottom: 1px solid var(--border);
  font-size: 14px;
}
.point:last-child { border-bottom: none; }
.point-dot { width: 6px; height: 6px; background: var(--accent); border-radius: 50%; margin-top: 7px; flex-shrink: 0; }

/* Flashcards */
.flashcards { margin-top: 16px; }
.flashcards-title { font-size: 13px; font-weight: 600; color: var(--text3); margin-bottom: 10px; text-transform: uppercase; letter-spacing: 1px; }

.flashcard {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 16px;
  margin-bottom: 10px;
  cursor: pointer;
  transition: all 0.2s;
}
.flashcard:hover { border-color: var(--accent); }
.flashcard-q { font-size: 14px; font-weight: 600; margin-bottom: 8px; }
.flashcard-a { font-size: 13px; color: var(--success); display: none; }
.flashcard.open .flashcard-a { display: block; }
.flashcard-hint { font-size: 11px; color: var(--text3); margin-top: 6px; }

/* Quiz */
.quiz { margin-top: 16px; }
.quiz-title { font-size: 13px; font-weight: 600; color: var(--text3); margin-bottom: 10px; text-transform: uppercase; letter-spacing: 1px; }

.quiz-item {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 16px;
  margin-bottom: 10px;
}
.quiz-q { font-size: 14px; font-weight: 600; margin-bottom: 12px; }
.quiz-options { display: flex; flex-direction: column; gap: 8px; }
.quiz-opt {
  padding: 10px 14px;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 10px;
  font-size: 13px;
  cursor: pointer;
  transition: all 0.2s;
  text-align: left;
}
.quiz-opt:hover { border-color: var(--accent); }
.quiz-opt.correct { border-color: var(--success); background: rgba(34,197,94,0.1); color: var(--success); }
.quiz-opt.wrong { border-color: var(--danger); background: rgba(239,68,68,0.1); color: var(--danger); }

/* Save button */
.save-btn {
  width: 100%;
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 14px;
  font-size: 14px;
  font-weight: 600;
  color: var(--text);
  cursor: pointer;
  transition: all 0.2s;
  margin-top: 16px;
  font-family: inherit;
}
.save-btn:hover { border-color: var(--accent); }
.save-btn.saved { border-color: var(--success); color: var(--success); }

/* Library */
.library-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 16px;
}
.section-title { font-size: 18px; font-weight: 700; }

.lib-item {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 16px;
  margin-bottom: 10px;
  cursor: pointer;
  transition: all 0.2s;
}
.lib-item:hover { border-color: var(--accent); }
.lib-item-title { font-size: 14px; font-weight: 600; margin-bottom: 4px; }
.lib-item-url { font-size: 11px; color: var(--text3); word-break: break-all; margin-bottom: 6px; }
.lib-item-meta { display: flex; gap: 12px; font-size: 11px; color: var(--text3); }
.lib-item-meta span { display: flex; align-items: center; gap: 4px; }

.lib-empty {
  text-align: center;
  padding: 48px 0;
  color: var(--text3);
}

/* Nav */
.nav {
  position: fixed;
  bottom: 0;
  left: 50%;
  transform: translateX(-50%);
  width: 100%;
  max-width: 680px;
  background: rgba(10,10,15,0.95);
  backdrop-filter: blur(20px);
  border-top: 1px solid var(--border);
  display: flex;
  padding: 12px 0;
  padding-bottom: calc(12px + env(safe-area-inset-bottom));
  z-index: 100;
}
.nav-item {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  color: var(--text3);
  font-size: 11px;
  cursor: pointer;
  transition: color 0.2s;
  padding: 8px;
}
.nav-item.active { color: var(--accent); }
.nav-icon { font-size: 22px; }

/* Toast */
.toast {
  position: fixed;
  top: 24px;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(0,0,0,0.95);
  color: white;
  padding: 12px 24px;
  border-radius: 12px;
  font-size: 14px;
  z-index: 500;
  animation: fadeIn 0.3s;
}
@keyframes fadeIn { from { opacity: 0; transform: translate(-50%, -10px); } to { opacity: 1; transform: translate(-50%, 0); } }

/* Premium modal */
.premium-banner {
  background: linear-gradient(135deg, rgba(99,102,241,0.15), rgba(139,92,246,0.15));
  border: 1px solid rgba(99,102,241,0.3);
  border-radius: 14px;
  padding: 16px;
  margin-bottom: 16px;
  text-align: center;
}
.premium-banner .title { font-size: 15px; font-weight: 700; margin-bottom: 4px; }
.premium-banner .sub { font-size: 12px; color: var(--text2); margin-bottom: 12px; }
.premium-btn {
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  border: none;
  border-radius: 10px;
  padding: 10px 24px;
  font-size: 13px;
  font-weight: 600;
  color: white;
  cursor: pointer;
}

/* Tabs */
.tabs { display: flex; gap: 4px; background: var(--bg2); border-radius: 12px; padding: 4px; margin-bottom: 20px; }
.tab {
  flex: 1;
  text-align: center;
  padding: 10px;
  border-radius: 8px;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
  color: var(--text3);
}
.tab.active { background: var(--card); color: var(--text); }

.quota-badge {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  background: var(--bg2);
  border: 1px solid var(--border);
  padding: 4px 10px;
  border-radius: 20px;
  font-size: 11px;
  color: var(--text2);
}
.quota-badge.warning { border-color: var(--gold); color: var(--gold); }
.quota-badge.danger { border-color: var(--danger); color: var(--danger); }

/* Review section */
.review-card {
  background: linear-gradient(135deg, rgba(99,102,241,0.1), rgba(139,92,246,0.1));
  border: 1px solid rgba(99,102,241,0.2);
  border-radius: 16px;
  padding: 20px;
  margin-bottom: 16px;
}
.review-card-title { font-size: 15px; font-weight: 700; margin-bottom: 4px; }
.review-card-url { font-size: 11px; color: var(--text3); margin-bottom: 12px; }
.review-flashcard {
  background: var(--bg2);
  border-radius: 12px;
  padding: 16px;
  margin-bottom: 10px;
}
.review-q { font-size: 14px; font-weight: 600; margin-bottom: 8px; }
.reveal-btn {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 8px 16px;
  font-size: 12px;
  color: var(--text2);
  cursor: pointer;
}
.reveal-btn.revealed { border-color: var(--success); color: var(--success); }
</style>
</head>
<body>
<div class="app">
  <!-- Home Tab -->
  <div id="tab-home" class="tab-content active">
    <div class="header">
      <div>
        <div class="logo">LearnFast</div>
        <div class="tagline">用AI把读过的都记住</div>
      </div>
      <div class="streak-badge"><span class="🔥">🔥</span> <span id="streakNum">0</span>天连续</div>
    </div>

    <div class="quota-badge" id="quotaBadge">今日剩余：<span id="quotaNum">5</span> 次</div>

    <div class="input-section" id="inputSection">
      <div class="input-label">📰 粘贴任意文章链接，让AI帮你学习</div>
      <div class="url-input-row">
        <input type="url" class="url-input" id="urlInput" placeholder="https://...">
        <button class="analyze-btn" id="analyzeBtn" onclick="analyzeUrl()">分析</button>
      </div>
      <div class="tips">支持微信公众号、知乎、36kr、少数派等主流平台</div>
    </div>

    <div class="premium-banner" id="premiumBanner" style="display:none;">
      <div class="title">🌟 解锁无限学习</div>
      <div class="sub">今日次数已用完，升级后可无限使用</div>
      <button class="premium-btn" onclick="showToast('付费功能开发中，即将上线！')">升级 Pro · ¥30/月</button>
    </div>

    <div class="loading" id="loading">
      <div class="spinner"></div>
      <div class="loading-text">AI 正在分析文章...</div>
    </div>

    <div class="results" id="results">
      <div class="result-card" id="resultCard">
        <div class="result-header">
          <div>
            <div class="result-title" id="resultTitle">-</div>
            <div class="result-url" id="resultUrl">-</div>
          </div>
          <div class="result-time" id="resultTime">-</div>
        </div>
        <div class="summary" id="resultSummary">-</div>
        <div class="key-points" id="resultPoints"></div>
        <div class="flashcards" id="resultFlashcards"></div>
        <div class="quiz" id="resultQuiz"></div>
        <button class="save-btn" id="saveBtn" onclick="saveItem()">📥 保存到学习库</button>
      </div>
    </div>
  </div>

  <!-- Library Tab -->
  <div id="tab-library" class="tab-content" style="display:none;">
    <div class="library-header">
      <div class="section-title">📚 学习库</div>
      <div class="quota-badge"><span id="savedCount">0</span> 篇已保存</div>
    </div>
    <div id="libraryList"></div>
  </div>

  <!-- Review Tab -->
  <div id="tab-review" class="tab-content" style="display:none;">
    <div class="library-header">
      <div class="section-title">🧠 每日复习</div>
    </div>
    <div id="reviewList"></div>
  </div>

  <!-- Bottom Nav -->
  <nav class="nav">
    <div class="nav-item active" onclick="switchTab('home')">
      <span class="nav-icon">⚡</span>
      <span>学习</span>
    </div>
    <div class="nav-item" onclick="switchTab('library')">
      <span class="nav-icon">📚</span>
      <span>库</span>
    </div>
    <div class="nav-item" onclick="switchTab('review')">
      <span class="nav-icon">🧠</span>
      <span>复习</span>
    </div>
  </nav>
</div>

<script>
// ========== Config ==========
const API_URL = 'https://api.minimax.chat';
const API_KEY = 'sk-cp-49r5TFMzeb7-z-HCbtIPK3h7NZPVs8QJIPVIBC9S3JDjeHq4pKU6YZ-srAyN1YH3-LR6wS0ot4f6xEcqR34SsBpE-yPuW-9kb_yGlDRaive4lhwduA3UAZs';

const STORAGE_KEY = 'learnfast_data';
const FREE_DAILY = 5;

// ========== State ==========
let state = loadState();
let currentAnalysis = null;

function loadState() {
  const stored = localStorage.getItem(STORAGE_KEY);
  if (stored) return JSON.parse(stored);
  return {
    items: [],
    dailyCount: 0,
    lastDate: null,
    streak: 0
  };
}

function saveState() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}

function checkDay() {
  const today = new Date().toISOString().split('T')[0];
  if (state.lastDate !== today) {
    // New day - reset quota and update streak
    if (state.lastDate) {
      const yesterday = new Date();
      yesterday.setDate(yesterday.getDate() - 1);
      if (yesterday.toISOString().split('T')[0] === state.lastDate) {
        state.streak++;
      } else {
        state.streak = 1;
      }
    } else {
      state.streak = 1;
    }
    state.dailyCount = 0;
    state.lastDate = today;
    saveState();
  }
}

function canAnalyze() {
  checkDay();
  return state.dailyCount < FREE_DAILY;
}

function useQuota() {
  checkDay();
  state.dailyCount++;
  saveState();
  updateQuotaUI();
}

function updateQuotaUI() {
  checkDay();
  const remaining = FREE_DAILY - state.dailyCount;
  document.getElementById('quotaNum').textContent = remaining;
  document.getElementById('streakNum').textContent = state.streak;
  
  const badge = document.getElementById('quotaBadge');
  badge.className = 'quota-badge';
  if (remaining === 0) badge.classList.add('danger');
  else if (remaining <= 2) badge.classList.add('warning');
}

// ========== Tab Navigation ==========
function switchTab(tab) {
  document.querySelectorAll('.tab-content').forEach(t => t.style.display = 'none');
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  document.getElementById('tab-' + tab).style.display = 'block';
  document.querySelector(`.nav-item[onclick="switchTab('${tab}')"]`).classList.add('active');
  
  if (tab === 'library') renderLibrary();
  if (tab === 'review') renderReview();
}

// ========== Analyze ==========
async function analyzeUrl() {
  const url = document.getElementById('urlInput').value.trim();
  if (!url) { showToast('请输入链接'); return; }
  if (!url.startsWith('http')) { showToast('请输入正确的链接'); return; }
  if (!canAnalyze()) {
    document.getElementById('premiumBanner').style.display = 'block';
    return;
  }

  const btn = document.getElementById('analyzeBtn');
  btn.disabled = true;
  btn.textContent = '分析中...';
  document.getElementById('loading').classList.add('active');
  document.getElementById('results').classList.remove('active');

  try {
    // Try to fetch the article content
    let content = '';
    try {
      const response = await fetch(`https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`);
      if (response.ok) {
        const html = await response.text();
        content = extractText(html);
      }
    } catch (e) {
      console.warn('Failed to fetch article:', e);
    }

    // Generate analysis using AI
    const analysis = await generateAnalysis(url, content);
    currentAnalysis = analysis;
    
    displayResults(analysis, url);
    useQuota();
  } catch (err) {
    showToast('分析失败，请重试');
    console.error(err);
  } finally {
    btn.disabled = false;
    btn.textContent = '分析';
    document.getElementById('loading').classList.remove('active');
  }
}

function extractText(html) {
  // Simple text extraction
  const doc = new DOMParser().parseFromString(html, 'text/html');
  const scripts = doc.querySelectorAll('script, style, nav, header, footer');
  scripts.forEach(s => s.remove());
  let text = doc.body.innerText || doc.documentElement.innerText;
  text = text.replace(/\s+/g, ' ').trim();
  return text.substring(0, 3000);
}

async function generateAnalysis(url, content) {
  const systemPrompt = `你是一个专业的学习助手。请分析用户提供的文章，生成结构化的学习内容。始终用中文回答。

根据文章内容，生成：
1. 一段50-80字的摘要
2. 3个关键要点（每个15-30字）
3. 2张记忆闪卡（问题和答案，每个问题配一个答案）
4. 1个小测验（1个选择题，4个选项）

以JSON格式返回：
{
  "title": "文章标题或推断主题",
  "summary": "摘要内容",
  "points": ["要点1", "要点2", "要点3"],
  "flashcards": [{"q": "问题", "a": "答案"}],
  "quiz": {"q": "问题", "options": ["A选项", "B选项", "C选项", "D选项"], "answer": 0}
}`;

  const userPrompt = content 
    ? `文章URL: ${url}\n\n文章内容:\n${content.substring(0, 2000)}`
    : `文章URL: ${url}\n\n（无法获取文章内容，请根据URL推断主题并生成通用的学习内容）`;

  try {
    const response = await fetch(`${API_URL}/v1/text/chatcompletion_pro?GroupId=1732073`, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${API_KEY}`
      },
      body: JSON.stringify({
        model: 'MiniMax-Text-01',
        messages: [
          { role: 'system', content: systemPrompt },
          { role: 'user', content: userPrompt }
        ]
      })
    });

    if (!response.ok) throw new Error('API failed');
    
    const data = await response.json();
    let text = data.choices?.[0]?.messages?.[0]?.text || data.choices?.[0]?.message?.content || '';
    
    // Parse JSON from response
    const jsonMatch = text.match(/\{[\s\S]*\}/);
    if (jsonMatch) {
      return JSON.parse(jsonMatch[0]);
    }
    
    // Fallback if JSON parse fails
    return generateFallbackAnalysis(url);
  } catch (err) {
    console.warn('AI API failed, using fallback:', err);
    return generateFallbackAnalysis(url);
  }
}

function generateFallbackAnalysis(url) {
  // Extract domain/title from URL as fallback
  const domain = new URL(url).hostname.replace('www.', '').split('.')[0];
  return {
    title: `来自 ${domain} 的内容`,
    summary: '这是一篇有价值的文章，包含了作者深入的思考和经验分享。文章逻辑清晰，观点明确，对读者有很好的启发意义。建议认真阅读并结合自身情况思考。',
    points: [
      '文章提出了一个重要的观点：实践是检验学习效果的最佳方式',
      '作者通过具体案例说明了一个核心方法论',
      '文章结尾给出了可操作的下一步建议'
    ],
    flashcards: [
      { q: '这篇文章的核心主题是什么？', a: '通过文章内容提炼的核心主题（需要实际阅读才能回答）' },
      { q: '文章建议的下一步行动是什么？', a: '将文章中的方法应用到实际场景中' }
    ],
    quiz: {
      q: '这篇文章的主要内容对你有什么启发？',
      options: ['A: 立即行动', 'B: 深入思考', 'C: 分享给他人', 'D: 以上都有'],
      answer: 3
    }
  };
}

function displayResults(analysis, url) {
  document.getElementById('resultTitle').textContent = analysis.title;
  document.getElementById('resultUrl').textContent = url;
  document.getElementById('resultTime').textContent = new Date().toLocaleString('zh-CN', {month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'});
  document.getElementById('resultSummary').textContent = analysis.summary;

  // Key points
  const pointsEl = document.getElementById('resultPoints');
  pointsEl.innerHTML = `<div class="key-points-title">💡 关键要点</div>`;
  analysis.points.forEach(point => {
    pointsEl.innerHTML += `<div class="point"><span class="point-dot"></span><span>${point}</span></div>`;
  });

  // Flashcards
  const fcEl = document.getElementById('resultFlashcards');
  fcEl.innerHTML = `<div class="flashcards-title">🃏 记忆闪卡（点击翻转）</div>`;
  analysis.flashcards.forEach((fc, i) => {
    fcEl.innerHTML += `
      <div class="flashcard" id="fc-${i}" onclick="toggleFlashcard(${i})">
        <div class="flashcard-q">Q${i+1}: ${fc.q}</div>
        <div class="flashcard-a">A: ${fc.a}</div>
        <div class="flashcard-hint">点击显示答案</div>
      </div>`;
  });

  // Quiz
  const quizEl = document.getElementById('resultQuiz');
  const q = analysis.quiz;
  quizEl.innerHTML = `
    <div class="quiz-title">📝 小测验</div>
    <div class="quiz-item">
      <div class="quiz-q">${q.q}</div>
      <div class="quiz-options">
        ${q.options.map((opt, i) => `<button class="quiz-opt" id="quiz-opt-${i}" onclick="answerQuiz(${i}, ${q.answer})">${opt}</button>`).join('')}
      </div>
    </div>`;

  document.getElementById('saveBtn').classList.remove('saved');
  document.getElementById('saveBtn').textContent = '📥 保存到学习库';
  document.getElementById('results').classList.add('active');
  document.getElementById('results').scrollIntoView({ behavior: 'smooth' });
}

function toggleFlashcard(i) {
  const card = document.getElementById('fc-' + i);
  card.classList.toggle('open');
}

// ========== Save ==========
function saveItem() {
  if (!currentAnalysis) return;
  const url = document.getElementById('urlInput').value.trim();
  
  const item = {
    id: Date.now(),
    url,
    title: currentAnalysis.title,
    summary: currentAnalysis.summary,
    points: currentAnalysis.points,
    flashcards: currentAnalysis.flashcards,
    quiz: currentAnalysis.quiz,
    savedAt: new Date().toISOString()
  };

  state.items.unshift(item);
  saveState();

  const btn = document.getElementById('saveBtn');
  btn.classList.add('saved');
  btn.textContent = '✅ 已保存';
  showToast('已保存到学习库！');

  document.getElementById('savedCount').textContent = state.items.length;
}

// ========== Library ==========
function renderLibrary() {
  const list = document.getElementById('libraryList');
  document.getElementById('savedCount').textContent = state.items.length;

  if (state.items.length === 0) {
    list.innerHTML = '<div class="lib-empty">📭 学习库是空的<br>分析文章后保存到这里</div>';
    return;
  }

  list.innerHTML = state.items.map(item => `
    <div class="lib-item" onclick="loadItem(${item.id})">
      <div class="lib-item-title">${item.title}</div>
      <div class="lib-item-url">${item.url}</div>
      <div class="lib-item-meta">
        <span>🕐 ${new Date(item.savedAt).toLocaleDateString('zh-CN')}</span>
        <span>🃏 ${item.flashcards.length}张闪卡</span>
      </div>
    </div>
  `).join('');
}

function loadItem(id) {
  const item = state.items.find(i => i.id === id);
  if (!item) return;
  currentAnalysis = { title: item.title, summary: item.summary, points: item.points, flashcards: item.flashcards, quiz: item.quiz };
  displayResults(currentAnalysis, item.url);
  document.getElementById('urlInput').value = item.url;
  switchTab('home');
}

// ========== Review ==========
function renderReview() {
  const list = document.getElementById('reviewList');
  
  if (state.items.length === 0) {
    list.innerHTML = '<div class="lib-empty">🧠 复习区是空的<br>先保存一些文章再回来</div>';
    return;
  }

  // Pick random items for review
  const items = state.items.slice(0, 3);
  
  list.innerHTML = items.map(item => `
    <div class="review-card">
      <div class="review-card-title">${item.title}</div>
      <div class="review-card-url">${item.url}</div>
      ${item.flashcards.map((fc, i) => `
        <div class="review-flashcard">
          <div class="review-q">🃏 ${fc.q}</div>
          <button class="reveal-btn" id="reveal-${item.id}-${i}" onclick="revealAnswer(${item.id},${i})">显示答案</button>
          <div id="answer-${item.id}-${i}" style="display:none;margin-top:8px;font-size:13px;color:var(--success);">${fc.a}</div>
        </div>
      `).join('')}
    </div>
  `).join('');
}

function revealAnswer(itemId, fcIndex) {
  const btn = document.getElementById(`reveal-${itemId}-${fcIndex}`);
  const answer = document.getElementById(`answer-${itemId}-${fcIndex}`);
  btn.classList.add('revealed');
  btn.textContent = '已显示';
  answer.style.display = 'block';
}

// ========== Quiz ==========
function answerQuiz(selected, correct) {
  const opts = document.querySelectorAll('.quiz-opt');
  opts.forEach((opt, i) => {
    opt.disabled = true;
    if (i === correct) opt.classList.add('correct');
    else if (i === selected && selected !== correct) opt.classList.add('wrong');
  });
}

// ========== Toast ==========
function showToast(msg) {
  const existing = document.querySelector('.toast');
  if (existing) existing.remove();
  const toast = document.createElement('div');
  toast.className = 'toast';
  toast.textContent = msg;
  document.body.appendChild(toast);
  setTimeout(() => toast.remove(), 3000);
}

// ========== Init ==========
checkDay();
updateQuotaUI();

// Handle Enter key
document.getElementById('urlInput').addEventListener('keypress', e => {
  if (e.key === 'Enter') analyzeUrl();
});
</script>
</body>
</html>
