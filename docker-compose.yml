services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: learnfast
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - MINIMAX_API_KEY=sk-cp-49r5TFMzeb7-z-HCbtIPK3h7NZPVs8QJIPVIBC9S3JDjeHq4pKU6YZ-srAyN1YH3-LR6wS0ot4f6xEcqR34SsBpE-yPuW-9kb_yGlDRaive4lhwduA3UAZs
      - MINIMAX_API_URL=https://api.minimaxi.com/anthropic/v1/messages
      - MINIMAX_GROUP_ID=1732073
    volumes:
      - learnfast-data:/app/data
    networks:
      - learnfast-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  learnfast-data:
    driver: local

networks:
  learnfast-network:
    driver: bridge
