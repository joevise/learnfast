services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: learnfast
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
    volumes:
      - learnfast-data:/app/data
    networks:
      - learnfast-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  learnfast-data:
    driver: local

networks:
  learnfast-network:
    driver: bridge
